apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    uid: occ-prometheus
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    uid: occ-loki
    url: http://loki:3100

  - name: Tempo
    type: tempo
    access: proxy
    uid: occ-tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: occ-loki
        tags: ["service.name"]
      serviceMap:
        datasourceUid: occ-prometheus
      nodeGraph:
        enabled: true
